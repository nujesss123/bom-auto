name: Build BOM site
on:
  push:
    paths:
      - '**.xlsx'
      - '**.csv'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install python-calamine openpyxl cryptography
      - name: Rebuild index.html
        env:
          BOM_PASSWORD: ${{ secrets.BOM_PASSWORD }}
        run: python build.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "변경 없음 - 커밋 건너뜀"
          else
            git commit -m "자동 빌드: BOM 데이터 갱신"
            git push
          fi
